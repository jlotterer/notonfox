name: Daily News Analysis

on:
  schedule:
    - cron: "0 0 * * *"  # Midnight UTC = 8 PM EDT / 7 PM EST
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install dependencies
        run: npm install

      - name: Run daily analysis
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/generate.js

      - name: Update archive index
        run: node scripts/update-archive-index.js

      - name: Commit and push results
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add public/data/
          git diff --staged --quiet || git commit -m "chore: daily analysis $(date -u +'%Y-%m-%d')"
          git push

      - name: Print summary
        run: |
          node -e "
          const d = JSON.parse(require('fs').readFileSync('public/data/latest.json'));
          const s = d.daily_summary;
          console.log('Date:', d.date_display);
          console.log('Severity:', s.average_severity_score + '/100');
          console.log('Critical gaps:', s.critical_omissions);
          "